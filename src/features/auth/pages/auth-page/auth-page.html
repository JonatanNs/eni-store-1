    <article>
        <h2>Inscription</h2>
        <p>Email: admin@admin | mdp: admin</p>
        <form [formGroup]="registerForm">
            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <label class="label">Prénom</label>
                <input type="text" formControlName="lastName" class="input" placeholder="Prénom" />
            </fieldset>

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <label class="label">Nom</label>
                <input type="text" formControlName="firstName" class="input" placeholder="Nom" />
            </fieldset>

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <label class="label">Email</label>
                <input type="email" formControlName="email" class="input" placeholder="Email" />
            </fieldset>

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <label class="label">Mot de passe</label>
                <input type="password" formControlName="password" class="input" placeholder="Password" />
            </fieldset>

            <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
                <button type="submit" class="btn btn-neutral mt-4">S'inscrire</button>
            </fieldset>
        </form>
    </article>
</section>
