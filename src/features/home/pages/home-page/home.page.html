<!-- async pipe gère le chargement automatiquement -->
<div *ngIf="articles$ | async as articles; else loading">
  <app-article-list [articlesList]="articles"></app-article-list>
</div>

<ng-template #loading>
  <div class="text-center">Chargement...</div>
</ng-template>
