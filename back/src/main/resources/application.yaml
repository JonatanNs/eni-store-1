spring:
  application:
    name: eni-store

  profiles:
    active: mongo

  datasource:
    url: jdbc:mysql://localhost:3306/eni-store
    username: ${USERNAME_DB}
    password: ${PASSWORD_DB}
  data:
    mongodb:
      uri: mongodb://localhost:27017/eni-store

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

baseUrl: http://localhost:4200
