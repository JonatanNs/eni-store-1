<article>
  <h2>Connexion</h2>
  <form [formGroup]="loginForm">
    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
      <label class="label">Email</label>
      <input type="email" formControlName="email" class="input" placeholder="Email" />
      @if(getFormError('email')){ <p class="text-red-500">{{ getFormError('email') }}</p>}
    </fieldset>

    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
      <label class="label">Mot de passe</label>
      <input type="password" formControlName="password" class="input" placeholder="Mot de passe" />
      @if(getFormError('password')){<p class="text-red-500">{{ getFormError('password') }}</p> }
    </fieldset>

    <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
      <button class="btn btn-neutral mt-4">Se connecter</button>
    </fieldset>
  </form>
</article>
